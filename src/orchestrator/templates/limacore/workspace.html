<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ problem.title }} · Lima-core</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"IBM Plex Sans"', 'system-ui', 'sans-serif'],
            display: ['"Space Grotesk"', 'system-ui', 'sans-serif'],
          },
          colors: {
            ink: '#08131c',
            brass: '#f4c95d',
            algae: '#93e1b1',
            rust: '#c96c50',
          },
        },
      },
    };
  </script>
  <style>
    body { background: linear-gradient(180deg, rgba(147,225,177,0.07), transparent 180px), #08131c; }
  </style>
</head>
<body class="min-h-screen font-sans text-slate-100">
  {% include "limacore/partials/topbar.html" %}
  <main
    id="workspace-shell"
    class="mx-auto max-w-7xl px-6 py-8"
    hx-get="/api/limacore/workspace?problem={{ problem.slug }}"
    hx-trigger="load, every 6s"
    hx-target="#workspace-shell"
    hx-swap="outerHTML">
    {% include "limacore/partials/workspace_body.html" %}
  </main>
</body>
</html>
